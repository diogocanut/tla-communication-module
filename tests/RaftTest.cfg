SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    Servers   = {"s1", "s2", "s3"}
    Values    = {"v1"}
    MaxTerm   = 2
    MaxLogLength = 3

\* Safety invariants (Ongaro & Ousterhout, USENIX ATC 2014)
INVARIANT TypeOK
INVARIANT InvariantElectionSafety
INVARIANT InvariantLogMatching
INVARIANT InvariantStateMachineSafety
INVARIANT InvariantLeaderCompleteness

\* Liveness (requires fairness — enabled in Spec)
\* PROPERTY PropertyEventualLeader

ALIAS Alias
